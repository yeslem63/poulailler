<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Poulailler"/>
<title>Gestion Poulailler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F7F5F0;
  --surface:#FFFFFF;
  --surface2:#F0EDE6;
  --green:#2D7A5F;
  --green-light:#E8F5EF;
  --green-text:#1A5C44;
  --red:#C0392B;
  --red-light:#FDEEEC;
  --amber:#B8690A;
  --amber-light:#FEF3E2;
  --text:#1A1A18;
  --text2:#6B6B64;
  --text3:#A8A89E;
  --border:#E2DDD4;
  --radius:12px;
  --radius-sm:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 10px;padding-top:calc(12px + env(safe-area-inset-top,0px))}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:19px;font-weight:600;letter-spacing:-0.3px}
.header-sub{font-size:12px;color:var(--text3);margin-top:1px}
.season-chips{display:flex;gap:6px;margin-top:8px}
.chip{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer}
.chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.chip.closed{background:var(--surface2);color:var(--text3);text-decoration:line-through}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(80px + var(--safe-bottom))}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;cursor:pointer;color:var(--text3);font-size:10px;gap:3px;border:none;background:none}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:20px;line-height:1}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px}

/* METRICS */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.metric-value{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.metric-unit{font-size:11px;color:var(--text3);margin-left:2px}
.metric.green .metric-value{color:var(--green-text)}
.metric.red .metric-value{color:var(--red)}

/* FORM */
.field{margin-bottom:10px}
.field label{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);-webkit-appearance:none}
.field textarea{height:64px;resize:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}

/* BUTTONS */
.btn{width:100%;padding:11px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.1px}
.btn-primary{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn+.btn{margin-top:7px}

/* LOG ITEMS */
.log{border-left:2px solid var(--green);padding:7px 10px;background:var(--green-light);border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-bottom:6px}
.log.red{border-color:var(--red);background:var(--red-light)}
.log-date{font-size:11px;color:var(--text3);margin-bottom:2px;font-family:'DM Mono',monospace}
.log-row{display:flex;justify-content:space-between;align-items:center}
.log-desc{font-size:13px;color:var(--text)}
.log-amount{font-size:13px;font-weight:600;color:var(--green-text)}
.log-del{font-size:12px;color:var(--red);margin-left:8px;cursor:pointer;padding:2px 4px}

/* SEPARATOR */
.sep{height:1px;background:var(--border);margin:12px 0}

/* PROFIT */
.profit-big{text-align:center;padding:16px 0}
.profit-big .label{font-size:12px;color:var(--text3);margin-bottom:6px}
.profit-big .amount{font-size:34px;font-weight:600;letter-spacing:-1px}
.profit-big .amount.pos{color:var(--green-text)}
.profit-big .amount.neg{color:var(--red)}

/* TABLE */
.tbl{width:100%;font-size:13px;border-collapse:collapse}
.tbl td{padding:5px 0;vertical-align:top}
.tbl td:first-child{color:var(--text2)}
.tbl td:last-child{text-align:right;font-weight:500}

/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-light);color:var(--green-text)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-gray{background:var(--surface2);color:var(--text3)}

/* WORKER */
.worker{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green-text);flex-shrink:0}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:none;align-items:flex-end;justify-content:center;padding-bottom:var(--safe-bottom)}
.overlay.show{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px 28px;width:100%;max-width:480px}
.sheet h3{font-size:17px;font-weight:600;margin-bottom:8px}
.sheet p{font-size:14px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.sheet-btns{display:flex;gap:8px}
.sheet-btns button{flex:1;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif}

/* EMPTY */
.empty{text-align:center;padding:28px 0;color:var(--text3);font-size:14px}

/* HISTORY */
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div>
      <h1>🐔 Poulailler</h1>
      <div class="header-sub" id="hdr-sub">3 hangars actifs</div>
    </div>
  </div>
  <div class="season-chips">
    <div class="chip active" id="chip-H1" onclick="selHangar('H1')">H1 — S<span id="chip-s1">1</span></div>
    <div class="chip" id="chip-H2" onclick="selHangar('H2')">H2 — S<span id="chip-s2">1</span></div>
    <div class="chip" id="chip-H3" onclick="selHangar('H3')">H3 — S<span id="chip-s3">1</span></div>
  </div>
</div>

<!-- SCROLL -->
<div class="scroll" id="scroll-area">
  <div id="page-dashboard"></div>
  <div id="page-hangar" style="display:none"></div>
  <div id="page-ventes" style="display:none"></div>
  <div id="page-benefice" style="display:none"></div>
  <div id="page-historique" style="display:none"></div>
  <div id="page-equipe" style="display:none"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="goPage('dashboard',this)"><span class="nav-icon">📊</span>Tableau</button>
  <button class="nav-btn" onclick="goPage('hangar',this)"><span class="nav-icon">🏠</span>Hangar</button>
  <button class="nav-btn" onclick="goPage('ventes',this)"><span class="nav-icon">💰</span>Ventes</button>
  <button class="nav-btn" onclick="goPage('benefice',this)"><span class="nav-icon">📈</span>Bénéfice</button>
  <button class="nav-btn" onclick="goPage('historique',this)"><span class="nav-icon">📋</span>Historique</button>
  <button class="nav-btn" onclick="goPage('equipe',this)"><span class="nav-icon">👥</span>Équipe</button>
</div>
</div>

<!-- MODAL FIN SAISON -->
<div class="overlay" id="modal-fin">
  <div class="sheet">
    <h3>Terminer la saison ?</h3>
    <p>Toutes les données seront archivées dans l'historique. Une nouvelle saison démarrera automatiquement.</p>
    <div class="sheet-btns">
      <button onclick="closeModal()" style="background:var(--surface2)">Annuler</button>
      <button onclick="confirmerFin()" style="background:var(--red);color:#fff;border-color:var(--red)">Terminer</button>
    </div>
  </div>
</div>

<script>
const KEY='poul_v4';
let ST=load(), curH='H1', curPage='dashboard';

function load(){
  try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}
  return freshState();
}
function freshState(){
  const s={hangars:{},hist:[],workers:[],acts:[]};
  ['H1','H2','H3'].forEach(h=>{s.hangars[h]=freshHangar(h,1);});
  return s;
}
function freshHangar(id,saison){
  return{id,saison,statut:'actif',poulets:0,mortalite:0,age:0,note:'',
    nourriture:[],gaz:[],medicaments:[],imprevu:[],ventes:[]};
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(ST));}catch(e){}}
function today(){return new Date().toLocaleDateString('fr-FR');}
function fmt(n){return Math.round(n).toLocaleString('fr-FR');}
function sum(arr,f){return(arr||[]).reduce((a,b)=>a+(parseFloat(b[f])||0),0);}
function depTotal(g){return sum(g.nourriture,'montant')+sum(g.gaz,'montant')+sum(g.medicaments,'montant')+sum(g.imprevu,'montant');}
function act(msg,h){ST.acts.unshift({date:today(),msg,h});if(ST.acts.length>40)ST.acts.pop();}

function goPage(p,btn){
  curPage=p;
  document.querySelectorAll('.page-div').forEach(x=>{});
  ['dashboard','hangar','ventes','benefice','historique','equipe'].forEach(n=>{
    document.getElementById('page-'+n).style.display=n===p?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('scroll-area').scrollTop=0;
  renders[p]&&renders[p]();
}

function selHangar(h){
  curH=h;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('chip-'+h).classList.add('active');
  if(curPage==='hangar')renderHangar();
  else if(curPage==='ventes')renderVentes();
  else if(curPage==='benefice')renderBenefice();
}

function updateChips(){
  ['H1','H2','H3'].forEach((h,i)=>{
    const g=ST.hangars[h];
    document.getElementById('chip-s'+(i+1)).textContent=g.saison;
    const c=document.getElementById('chip-'+h);
    c.className='chip'+(h===curH?' active':'')+(g.statut!=='actif'?' closed':'');
  });
  const active=['H1','H2','H3'].filter(h=>ST.hangars[h].statut==='actif').length;
  document.getElementById('hdr-sub').textContent=active+' hangar'+(active!==1?'s':'')+' actif'+(active!==1?'s':'');
}

/* ===== DASHBOARD ===== */
function renderDashboard(){
  let tp=0,tm=0,td=0,tv=0;
  ['H1','H2','H3'].forEach(h=>{const g=ST.hangars[h];tp+=g.poulets;tm+=g.mortalite;td+=depTotal(g);tv+=sum(g.ventes,'montant');});
  let hl='';
  ['H1','H2','H3'].forEach(h=>{
    const g=ST.hangars[h];const dep=depTotal(g);const ven=sum(g.ventes,'montant');const ben=ven-dep;
    const badge=g.statut==='actif'?'<span class="badge badge-green">Actif</span>':'<span class="badge badge-gray">Fermé</span>';
    hl+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
      <div><b style="font-size:15px">${h}</b> <span style="font-size:11px;color:var(--text3)">Saison ${g.saison}</span> ${badge}</div>
      <div style="text-align:right">
        <div style="font-size:14px;font-weight:600;color:${ben>=0?'var(--green-text)':'var(--red)'}">${ben>=0?'+':''}${fmt(ben)} MRU</div>
        <div style="font-size:11px;color:var(--text3)">${g.poulets} poulets · ${g.mortalite} morts</div>
      </div></div>`;
  });
  let al='';
  (ST.acts||[]).slice(0,6).forEach(a=>{
    al+=`<div class="log"><div class="log-date">${a.date} · ${a.h}</div><div class="log-desc">${a.msg}</div></div>`;
  });
  document.getElementById('page-dashboard').innerHTML=`
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total poulets</div><div class="metric-value">${tp}</div></div>
    <div class="metric"><div class="metric-label">Mortalité</div><div class="metric-value">${tm}</div></div>
    <div class="metric"><div class="metric-label">Dépenses</div><div class="metric-value" style="font-size:16px">${fmt(td)}<span class="metric-unit">MRU</span></div></div>
    <div class="metric green"><div class="metric-label">Ventes</div><div class="metric-value" style="font-size:16px">${fmt(tv)}<span class="metric-unit">MRU</span></div></div>
  </div>
  <div class="card"><div class="card-title">Hangars</div>${hl}</div>
  <div class="card"><div class="card-title">Activités récentes</div>${al||'<div class="empty">Aucune activité</div>'}</div>`;
}

/* ===== HANGAR ===== */
function renderHangar(){
  const g=ST.hangars[curH];const closed=g.statut!=='actif';
  const dn=sum(g.nourriture,'montant'),dg=sum(g.gaz,'montant'),dm=sum(g.medicaments,'montant'),di=sum(g.imprevu,'montant');
  let html=`
  <div class="metrics">
    <div class="metric"><div class="metric-label">Poulets</div><div class="metric-value">${g.poulets}</div></div>
    <div class="metric ${g.mortalite>0?'red':''}"><div class="metric-label">Mortalité</div><div class="metric-value">${g.mortalite}</div><div class="metric-unit">${g.poulets>0?Math.round(g.mortalite/g.poulets*100):0}%</div></div>
    <div class="metric"><div class="metric-label">Âge</div><div class="metric-value">${g.age||0}<span class="metric-unit">j</span></div></div>
    <div class="metric"><div class="metric-label">Saison</div><div class="metric-value">${g.saison}</div></div>
  </div>`;

  if(!closed){
    html+=`<div class="card"><div class="card-title">Informations générales</div>
    <div class="field"><label>Nombre de poulets</label><input type="number" id="f-poulets" value="${g.poulets}" inputmode="numeric"/></div>
    <div class="field"><label>Mortalité (têtes)</label><input type="number" id="f-mort" value="${g.mortalite}" inputmode="numeric"/></div>
    <div class="field"><label>Âge (jours)</label><input type="number" id="f-age" value="${g.age||0}" inputmode="numeric"/></div>
    <div class="field"><label>Note</label><textarea id="f-note" placeholder="Observations...">${g.note||''}</textarea></div>
    <button class="btn btn-primary" onclick="saveGen()">💾 Enregistrer</button></div>`;
  }

  html+=buildSection('Nourriture 🌾',dn,'n','nourriture',closed,g,'qty');
  html+=buildSection('Gaz 🔥',dg,'gz','gaz',closed,g,null);
  html+=buildSection('Médicaments 💊',dm,'md','medicaments',closed,g,null);
  html+=buildSection('Imprévus ⚠️',di,'im','imprevu',closed,g,null);

  if(!closed){
    html+=`<button class="btn btn-danger" onclick="openModal('${curH}')" style="margin-top:4px">🔚 Terminer la saison ${g.saison}</button>`;
  } else {
    html+=`<div class="card" style="text-align:center;color:var(--text3);font-size:13px;padding:20px">Saison ${g.saison} terminée — lecture seule</div>`;
  }
  document.getElementById('page-hangar').innerHTML=html;
  if(!closed) setTodayDates(['n-date','gz-date','md-date','im-date']);
}

function buildSection(title,total,pfx,key,closed,g,hasQty){
  let h=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="card-title" style="margin-bottom:0">${title}</span><span style="font-size:13px;font-weight:600;color:var(--green-text)">${fmt(total)} MRU</span></div>`;
  if(!closed){
    h+=`<div class="field"><label>Date</label><input type="date" id="${pfx}-date"/></div>`;
    if(hasQty) h+=`<div class="field"><label>Quantité (kg)</label><input type="number" id="${pfx}-qty" placeholder="0" inputmode="decimal"/></div>`;
    h+=`<div class="field"><label>Description</label><input type="text" id="${pfx}-desc" placeholder="Description..."/></div>
    <div class="field"><label>Montant (MRU)</label><input type="number" id="${pfx}-mont" placeholder="0" inputmode="decimal"/></div>
    <button class="btn btn-ghost" onclick="addDep('${key}','${pfx}')" style="margin-bottom:10px">+ Ajouter</button>`;
  }
  const arr=g[key]||[];
  if(arr.length===0) h+='<div class="empty">Aucune entrée</div>';
  else h+=arr.slice().reverse().map((item,ri)=>{
    const i=arr.length-1-ri;
    const del=closed?'':` <span class="log-del" onclick="delItem('${key}',${i})">✕</span>`;
    const qty=item.qty?` · ${item.qty}kg`:'';
    return `<div class="log"><div class="log-date">${item.date||''}${qty}</div>
    <div class="log-row"><span class="log-desc">${item.desc||'—'}</span>
    <span><span class="log-amount">${fmt(item.montant||0)} MRU</span>${del}</span></div></div>`;
  }).join('');
  return h+'</div>';
}

function setTodayDates(ids){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.valueAsDate=new Date();});}

function saveGen(){
  const g=ST.hangars[curH];
  g.poulets=parseInt(document.getElementById('f-poulets').value)||0;
  g.mortalite=parseInt(document.getElementById('f-mort').value)||0;
  g.age=parseInt(document.getElementById('f-age').value)||0;
  g.note=document.getElementById('f-note').value||'';
  act(`Infos: ${g.poulets} poulets, ${g.mortalite} morts`,curH);
  save();renderHangar();
  showToast('Enregistré ✓');
}

function addDep(key,pfx){
  const g=ST.hangars[curH];
  const mont=parseFloat(document.getElementById(pfx+'-mont').value)||0;
  if(!mont){showToast('Montant requis');return;}
  const desc=document.getElementById(pfx+'-desc')?.value||'';
  const date=document.getElementById(pfx+'-date')?.value||today();
  const qty=document.getElementById(pfx+'-qty')?.value||null;
  g[key].push({date,desc,montant:mont,qty});
  act(`${key}: ${fmt(mont)} MRU (${desc||'—'})`,curH);
  save();renderHangar();
}

function delItem(key,i){
  if(!confirm('Supprimer?'))return;
  ST.hangars[curH][key].splice(i,1);
  save();renderHangar();
}

/* ===== VENTES ===== */
function renderVentes(){
  const g=ST.hangars[curH];const closed=g.statut!=='actif';
  const tv=sum(g.ventes,'montant');
  let html=`
  <div class="metrics">
    <div class="metric green"><div class="metric-label">Total vendu</div><div class="metric-value" style="font-size:16px">${fmt(tv)}<span class="metric-unit">MRU</span></div></div>
    <div class="metric"><div class="metric-label">Nb ventes</div><div class="metric-value">${(g.ventes||[]).length}</div></div>
  </div>`;
  if(!closed){
    html+=`<div class="card"><div class="card-title">Nouvelle vente</div>
    <div class="field"><label>Date</label><input type="date" id="v-date"/></div>
    <div class="field"><label>Nb poulets vendus</label><input type="number" id="v-nb" placeholder="0" inputmode="numeric" oninput="calcVente()"/></div>
    <div class="field"><label>Prix unitaire (MRU)</label><input type="number" id="v-pu" placeholder="0" inputmode="decimal" oninput="calcVente()"/></div>
    <div class="field"><label>Montant total (MRU)</label><input type="number" id="v-total" placeholder="Calculé auto" inputmode="decimal"/></div>
    <div class="field"><label>Acheteur (optionnel)</label><input type="text" id="v-ach" placeholder="Nom..."/></div>
    <button class="btn btn-primary" onclick="addVente()">💰 Enregistrer</button></div>`;
  }
  html+='<div class="card"><div class="card-title">Historique ventes</div>';
  const ventes=g.ventes||[];
  if(!ventes.length) html+='<div class="empty">Aucune vente</div>';
  else html+=ventes.slice().reverse().map((v,ri)=>{
    const i=ventes.length-1-ri;
    const del=closed?'':` <span class="log-del" onclick="delVente(${i})">✕</span>`;
    return `<div class="log"><div class="log-date">${v.date||''}${v.acheteur?' · '+v.acheteur:''}</div>
    <div class="log-row"><span class="log-desc">${v.nb||0} poulets @ ${v.pu||0} MRU</span>
    <span><span class="log-amount">${fmt(v.montant||0)} MRU</span>${del}</span></div></div>`;
  }).join('');
  html+='</div>';
  document.getElementById('page-ventes').innerHTML=html;
  const vd=document.getElementById('v-date');if(vd)vd.valueAsDate=new Date();
}

function calcVente(){
  const nb=parseFloat(document.getElementById('v-nb')?.value)||0;
  const pu=parseFloat(document.getElementById('v-pu')?.value)||0;
  if(nb&&pu){const t=document.getElementById('v-total');if(t)t.value=Math.round(nb*pu);}
}
function addVente(){
  const g=ST.hangars[curH];
  const nb=parseFloat(document.getElementById('v-nb').value)||0;
  const pu=parseFloat(document.getElementById('v-pu').value)||0;
  let mont=parseFloat(document.getElementById('v-total').value)||0;
  if(!mont&&nb&&pu)mont=nb*pu;
  if(!mont){showToast('Montant requis');return;}
  const v={date:document.getElementById('v-date').value||today(),nb,pu,montant:mont,acheteur:document.getElementById('v-ach').value||''};
  if(!g.ventes)g.ventes=[];
  g.ventes.push(v);
  act(`Vente: ${nb} poulets → ${fmt(mont)} MRU`,curH);
  save();renderVentes();
}
function delVente(i){if(!confirm('Supprimer?'))return;ST.hangars[curH].ventes.splice(i,1);save();renderVentes();}

/* ===== BENEFICE ===== */
function renderBenefice(){
  const g=ST.hangars[curH];
  const dep=depTotal(g);const ven=sum(g.ventes,'montant');const ben=ven-dep;
  document.getElementById('page-benefice').innerHTML=`
  <div class="card">
    <div class="card-title">Bénéfice — ${curH} Saison ${g.saison}</div>
    <div class="profit-big">
      <div class="label">Résultat net</div>
      <div class="amount ${ben>=0?'pos':'neg'}">${ben>=0?'+':''}${fmt(ben)} MRU</div>
    </div>
    <div class="sep"></div>
    <table class="tbl">
      <tr><td>Ventes totales</td><td style="color:var(--green-text)">${fmt(ven)} MRU</td></tr>
      <tr><td>Total dépenses</td><td style="color:var(--red)">−${fmt(dep)} MRU</td></tr>
    </table>
  </div>
  <div class="card">
    <div class="card-title">Détail dépenses</div>
    <table class="tbl">
      <tr><td>🌾 Nourriture</td><td>${fmt(sum(g.nourriture,'montant'))} MRU</td></tr>
      <tr><td>🔥 Gaz</td><td>${fmt(sum(g.gaz,'montant'))} MRU</td></tr>
      <tr><td>💊 Médicaments</td><td>${fmt(sum(g.medicaments,'montant'))} MRU</td></tr>
      <tr><td>⚠️ Imprévus</td><td>${fmt(sum(g.imprevu,'montant'))} MRU</td></tr>
    </table>
  </div>
  <div class="card">
    <div class="card-title">Rentabilité par poulet</div>
    <table class="tbl">
      <tr><td>Poulets départ</td><td>${g.poulets}</td></tr>
      <tr><td>Mortalité</td><td>${g.mortalite} (${g.poulets>0?Math.round(g.mortalite/g.poulets*100):0}%)</td></tr>
      <tr><td>Coût / poulet</td><td>${g.poulets>0?fmt(dep/g.poulets):0} MRU</td></tr>
      <tr><td>Revenu / poulet</td><td style="color:var(--green-text)">${g.poulets>0?fmt(ven/g.poulets):0} MRU</td></tr>
    </table>
  </div>`;
}

/* ===== HISTORIQUE ===== */
function renderHistorique(){
  const hist=ST.hist||[];
  let html='';
  if(!hist.length){html='<div class="card"><div class="empty">Aucune saison terminée</div></div>';}
  else{
    hist.slice().reverse().forEach(s=>{
      const dep=depTotal(s);const ven=sum(s.ventes,'montant');const ben=ven-dep;
      html+=`<div class="hist-card">
      <div class="hist-header">
        <div><b>${s.id}</b> <span class="badge badge-amber">Saison ${s.saison}</span></div>
        <span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${s.dateFin||''}</span>
      </div>
      <div class="metrics" style="margin-bottom:8px">
        <div class="metric"><div class="metric-label">Poulets</div><div class="metric-value">${s.poulets}</div></div>
        <div class="metric"><div class="metric-label">Mortalité</div><div class="metric-value">${s.mortalite}</div></div>
        <div class="metric"><div class="metric-label">Dépenses</div><div class="metric-value" style="font-size:14px">${fmt(dep)}<span class="metric-unit">MRU</span></div></div>
        <div class="metric green"><div class="metric-label">Ventes</div><div class="metric-value" style="font-size:14px">${fmt(ven)}<span class="metric-unit">MRU</span></div></div>
      </div>
      <div style="text-align:center;padding:8px 0;border-top:1px solid var(--border)">
        <span style="font-size:20px;font-weight:600;color:${ben>=0?'var(--green-text)':'var(--red)'}">${ben>=0?'+':''}${fmt(ben)} MRU</span>
      </div>
      ${s.note?`<div style="margin-top:8px;font-size:12px;color:var(--text2);border-top:1px solid var(--border);padding-top:8px">${s.note}</div>`:''}
      </div>`;
    });
  }
  document.getElementById('page-historique').innerHTML=html;
}

/* ===== EQUIPE ===== */
function renderEquipe(){
  const workers=ST.workers||[];
  let whtml='';
  if(!workers.length) whtml='<div class="empty">Aucun travailleur</div>';
  else workers.forEach((w,i)=>{
    const init=w.name.split(' ').map(x=>x[0]||'').join('').toUpperCase().slice(0,2)||'?';
    whtml+=`<div class="worker">
    <div class="avatar">${init}</div>
    <div style="flex:1"><div style="font-weight:600;font-size:14px">${w.name}</div><div style="font-size:12px;color:var(--text2)">${w.role||'—'}</div></div>
    <span style="cursor:pointer;color:var(--red);font-size:13px;padding:4px" onclick="delWorker(${i})">✕</span></div>`;
  });
  document.getElementById('page-equipe').innerHTML=`
  <div class="card"><div class="card-title">Travailleurs (${workers.length})</div>${whtml}</div>
  <div class="card"><div class="card-title">Ajouter un travailleur</div>
  <div class="field"><label>Nom complet</label><input type="text" id="w-name" placeholder="Prénom Nom"/></div>
  <div class="field"><label>Rôle / Hangar</label><input type="text" id="w-role" placeholder="ex: Responsable H1"/></div>
  <button class="btn btn-primary" onclick="addWorker()">+ Ajouter</button></div>`;
}
function addWorker(){
  const n=document.getElementById('w-name').value.trim();
  const r=document.getElementById('w-role').value.trim();
  if(!n){showToast('Nom requis');return;}
  if(!ST.workers)ST.workers=[];
  ST.workers.push({name:n,role:r});
  save();renderEquipe();
}
function delWorker(i){if(!confirm('Supprimer?'))return;ST.workers.splice(i,1);save();renderEquipe();}

/* ===== FIN SAISON ===== */
let finTarget=null;
function openModal(h){finTarget=h;document.getElementById('modal-fin').classList.add('show');}
function closeModal(){document.getElementById('modal-fin').classList.remove('show');finTarget=null;}
function confirmerFin(){
  if(!finTarget)return;
  const h=finTarget;
  const g=JSON.parse(JSON.stringify(ST.hangars[h]));
  g.dateFin=today();
  if(!ST.hist)ST.hist=[];
  ST.hist.push(g);
  act(`Saison ${g.saison} terminée ✓`,h);
  ST.hangars[h]=freshHangar(h,g.saison+1);
  closeModal();save();
  updateChips();renderHangar();
  showToast(`Saison ${g.saison} archivée ! Saison ${g.saison+1} démarrée.`);
}

/* ===== TOAST ===== */
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:500;pointer-events:none;transition:opacity 0.3s';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';},2000);
}

const renders={dashboard:renderDashboard,hangar:renderHangar,ventes:renderVentes,benefice:renderBenefice,historique:renderHistorique,equipe:renderEquipe};

renderDashboard();
updateChips();
</script>
</body>
</html>
